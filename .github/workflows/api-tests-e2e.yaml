name: API E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ENVIRONMENT: prod

jobs:
  run-api-tests:
    name: Run API E2E Tests (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "ENV=prod" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Extract and Store Playwright Version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(npm ls @playwright/test --json | node -e "const j=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(j).dependencies['@playwright/test'].version)")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright's Version: $PLAYWRIGHT_VERSION"

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          key: playwright-chromium-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          path: ~/.cache/ms-playwright

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run API Tests
        run: npx playwright test --project=api --workers=3

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-prod
          path: test-results

  allure-report:
    name: Allure Reporting (prod)
    runs-on: ubuntu-latest
    needs: run-api-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results from test job
        uses: actions/download-artifact@v4
        with:
          name: api-test-results-prod
          path: test-results

      - name: Download Allure Reports History
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: api-allure-report-history-prod
          path: test-results/allure-results/history

      - name: Install Allure Command Line
        run: npm install -g allure-commandline@2.34.1 ts-node

      - name: Generate Allure Report
        run: npm run allure:generate

      - name: Upload Allure Report History
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report-history-prod
          path: allure-report/history

      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-prod-final
          path: test-results

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: run-api-tests
    if: failure()
    steps:
      - name: Notify Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Webhook URL was not provided, skipping notification"
            exit 0
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "❌ API E2E tests failed on prod",
                "color": 16711680,
                "fields": [
                  {
                    "name": "Environment",
                    "value": "prod",
                    "inline": true
                  },
                  {
                    "name": "Workflow",
                    "value": "${{ github.workflow }}",
                    "inline": true
                  },
                  {
                    "name": "Run ID",
                    "value": "${{ github.run_id }}",
                    "inline": true
                  },
                  {
                    "name": "Repository",
                    "value": "${{ github.repository }}",
                    "inline": true
                  },
                  {
                    "name": "Build URL",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "inline": false
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
